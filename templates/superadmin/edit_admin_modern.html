{% extends "base_modern.html" %}

{% block title %}Adminni Tahrirlash - Joylinks IT{% endblock %}

{% block content %}
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Adminni Tahrirlash</h1>
            <p class="page-subtitle">"{{ admin.full_name }}" admin ma'lumotlarini yangilash</p>
        </div>
        <a href="{{ url_for('superadmin_admins') }}" class="btn-primary-custom">
            <i class="fas fa-arrow-left me-2"></i>Orqaga
        </a>
    </div>
</div>

<div class="content-card" style="max-width: 650px;">
    <form action="{{ url_for('superadmin_edit_admin', admin_id=admin.id) }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Filial</label>
            <select name="branch_id" class="form-select bg-dark text-light border-secondary" required>
                {% for branch in branches %}
                <option value="{{ branch.id }}" {% if admin.branch_id == branch.id %}selected{% endif %}>
                    {{ branch.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">To'liq Ism</label>
            <input type="text" name="full_name" class="form-control bg-dark text-light border-secondary" 
                   value="{{ admin.full_name }}" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Login (username)</label>
            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" 
                   value="{{ admin.username }}" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Yangi Parol <small class="text-muted">(bo'sh qoldiring — o'zgarmaydi)</small></label>
            <div class="input-group">
                <input type="password" name="password" id="passwordField" class="form-control bg-dark text-light border-secondary" 
                       placeholder="Yangi parol kiriting...">
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>
        
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn-primary-custom">
                <i class="fas fa-save me-2"></i>Saqlash
            </button>
            <a href="{{ url_for('superadmin_admins') }}" class="btn btn-outline-secondary">
                <i class="fas fa-times me-2"></i>Bekor qilish
            </a>
        </div>
    </form>
</div>

<style>
    .form-control:focus, .form-select:focus {
        background: var(--bg-secondary);
        border-color: var(--accent);
        box-shadow: 0 0 0 0.25rem rgba(26, 95, 79, 0.25);
        color: white;
    }
    .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23888888' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
    }
</style>

<script>
function togglePassword() {
    const field = document.getElementById('passwordField');
    const icon = document.getElementById('eyeIcon');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
