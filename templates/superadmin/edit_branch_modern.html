{% extends "base_modern.html" %}

{% block title %}Filialni Tahrirlash - Joylinks IT{% endblock %}

{% block content %}
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Filialni Tahrirlash</h1>
            <p class="page-subtitle">"{{ branch.name }}" filiali ma'lumotlarini yangilash</p>
        </div>
        <a href="{{ url_for('superadmin_branches') }}" class="btn-primary-custom">
            <i class="fas fa-arrow-left me-2"></i>Orqaga
        </a>
    </div>
</div>

<div class="content-card" style="max-width: 600px;">
    <form action="{{ url_for('superadmin_edit_branch', branch_id=branch.id) }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Filial Nomi</label>
            <input type="text" name="name" class="form-control bg-dark text-light border-secondary" 
                   value="{{ branch.name }}" required minlength="2" maxlength="100"
                   placeholder="Masalan: Joylinks Buxoro">
        </div>
        <div class="mb-3">
            <label class="form-label text-secondary small">Yaratilgan sana</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" 
                   value="{{ branch.created_at.strftime('%Y-%m-%d %H:%M') }}" disabled>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn-primary-custom">
                <i class="fas fa-save me-2"></i>Saqlash
            </button>
            <a href="{{ url_for('superadmin_branches') }}" class="btn btn-outline-secondary">
                <i class="fas fa-times me-2"></i>Bekor qilish
            </a>
        </div>
    </form>
</div>

<style>
    .form-control:focus {
        background: var(--bg-secondary);
        border-color: var(--accent);
        box-shadow: 0 0 0 0.25rem rgba(26, 95, 79, 0.25);
        color: white;
    }
</style>
{% endblock %}
